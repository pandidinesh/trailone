<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot PHP</title>
    <style>
        body { font-family: Arial; }
        #chatbox { width: 400px; height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; }
        #userInput { width: 300px; }
        .message { margin: 5px 0; }
        .user { color: blue; }
        .bot { color: green; }
    </style>
</head>
<body>

<h2>AI Chatbot</h2>
<div id="chatbox"></div>
<input type="text" id="userInput" placeholder="Type something...">
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const message = inputField.value.trim();
    if (!message) return;

    const chatbox = document.getElementById("chatbox");
    chatbox.innerHTML += `<div class="message user"><strong>You:</strong> ${message}</div>`;
    inputField.value = "";
    chatbox.scrollTop = chatbox.scrollHeight;

    try {
        const response = await fetch('chat.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });

        const result = await response.json();
        const botReply = result[0].generated_text || "Error: no reply";

        chatbox.innerHTML += `<div class="message bot"><strong>Bot:</strong> ${botReply}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
    } catch (err) {
        chatbox.innerHTML += `<div class="message bot"><strong>Bot:</strong> Request failed.</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
    }
}
</script>
