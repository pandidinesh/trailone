<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classroom Stream</title>
<style>
    body{
        margin:0;
        background:#121212;
        font-family:Arial, sans-serif;
        color:#fff;
    }

    .header{
        padding:15px;
        background:#1f1f1f;
        font-size:18px;
    }

    .stream{
        padding:15px;
    }

    .card{
        background:#1e1e1e;
        border-radius:12px;
        padding:15px;
        margin-bottom:15px;
    }

    .title{
        font-size:16px;
        font-weight:bold;
    }

    .date{
        font-size:13px;
        color:#aaa;
        margin-top:4px;
    }

    .comment{
        margin-top:12px;
        border-top:1px solid #333;
        padding-top:10px;
        color:#888;
        font-size:14px;
    }

    .nav{
        position:fixed;
        bottom:0;
        width:100%;
        display:flex;
        justify-content:space-around;
        background:#1f1f1f;
        padding:10px 0;
    }

    .nav div{
        color:#aaa;
        font-size:14px;
    }

    .active{
        color:#4da3ff;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="header">📘 Classroom</div>

<div class="stream">
    <div class="card">
        <div class="title">New material: Practice Problems</div>
        <div class="date">16 Jan</div>
        <div class="comment">Add class comment</div>
    </div>

    <div class="card">
        <div class="title">New material: 2 marks Q & A</div>
        <div class="date">16 Jan</div>
        <div class="comment">Add class comment</div>
    </div>

    <div class="card">
        <div class="title">New material: Syllabus</div>
        <div class="date">2 Jan</div>
        <div class="comment">Add class comment</div>
    </div>

    <div class="card">
        <div class="title">New material: Course Plan</div>
        <div class="date">2 Jan</div>
        <div class="comment">Add class comment</div>
    </div>
</div>

<div class="nav">
    <div class="active">Stream</div>
    <div><a href="one.html">chatbot</a></div>
    <div ><a href="new.html">upload </a></div>
</div>


</body>
</html>
