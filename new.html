<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>File Upload Dropdown</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 50px;
        text-align:center;
    }

    .card {
        width: 220px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 15px;
        position: relative;
    }

    .card h3 {
        margin: 0 0 10px;
        font-size: 16px;
        display: flex;
        justify-content: space-between;
    }

    .add-btn {
        width: 100%;
        padding: 8px;
        background: #f1f3f4;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    .dropdown {
        display: none;
        position: absolute;
        top: 75px;
        left: 15px;
        width: 190px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        padding: 8px 0;
        z-index: 10;
    }

    .dropdown-item {
        padding: 8px 15px;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
    }

    .dropdown-item:hover {
        background: #f1f3f4;
    }

    .divider {
        height: 1px;
        background: #ddd;
        margin: 5px 0;
    }

    .hidden-input {
        display: none;
    }

    .file-name {
        margin-top: 10px;
        font-size: 13px;
        color: green;
    }
</style>
</head>
<center>
<body>

<div class="card">
    <h3>
        Your work
        <span style="color:green; font-size:12px;">Assigned</span>
    </h3>

    <button class="add-btn" onclick="toggleDropdown()">+ Add or create</button>

    <div class="dropdown" id="dropdownMenu">
        <div class="dropdown-item">Google Drive</div>
        <div class="dropdown-item">Link</div>
        <div class="dropdown-item" onclick="openFileUpload()">File</div>

        <div class="divider"></div>

        <div class="dropdown-item">Docs</div>
        <div class="dropdown-item">Slides</div>
        <div class="dropdown-item">Sheets</div>
        <div class="dropdown-item">Drawings</div>
    </div>

    <input type="file" id="fileInput" class="hidden-input" onchange="showFileName()">
    <div class="file-name" id="fileName"></div>
</div>

<script>
    function toggleDropdown() {
        const dropdown = document.getElementById("dropdownMenu");
        dropdown.style.display =
            dropdown.style.display === "block" ? "none" : "block";
    }

    function openFileUpload() {
        document.getElementById("fileInput").click();
    }

    function showFileName() {
        const input = document.getElementById("fileInput");
        const fileNameDiv = document.getElementById("fileName");

        if (input.files.length > 0) {
            fileNameDiv.textContent = "Uploaded: " + input.files[0].name;
        }
    }

    // Close dropdown when clicking outside
    window.onclick = function(event) {
        if (!event.target.matches('.add-btn')) {
            document.getElementById("dropdownMenu").style.display = "none";
        }
    }
</script>

</body>
</center>
</html>
