<!DOCTYPE html>
<html>
<head>
  <title>Classes Slide Bar</title>

  <style>
    body{
      font-family: Arial;
      background:#f2f2f2;
      margin:0;
    }

    .class-btn{
      margin:20px;
      padding:12px 25px;
      font-size:18px;
      background:#000;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:8px;
    }

    /* Sidebar */
    .sidebar{
      height:100%;
      width:0;
      position:fixed;
      top:0;
      left:0;
      background:#111;
      overflow-x:hidden;
      transition:0.4s;
      padding-top:60px;
    }

    .close{
      position:absolute;
      top:15px;
      right:20px;
      color:white;
      font-size:25px;
      cursor:pointer;
    }

    .item{
      margin:15px;
      padding:15px;
      color:white;
      font-weight:bold;
      text-align:center;
      border-radius:12px;
      font-size:15px;
    }

    /* Colour styles */
    .ip{ background:#ff5733; }
    .os{ background:#33c1ff; }
    .daa{ background:#9d33ff; }
    .spa{ background:#33ff57; }
    .dbms{ background:#ff33a8; }
  </style>

</head>
<body>



<button class="class-btn" onclick="openBar()">CLASSES</button>

<div id="sidebar" class="sidebar">
  <span class="close" onclick="closeBar()">✖</span>

  <div class="item ip">INTERNET PROGRAMMING</div>
  <div class="item os">OPERATING SYSTEM</div>
  <div class="item daa">DESIGN AND ANALYSIS OF ALGORITHMS</div>
  <div class="item spa">SPA</div>
  <div class="item dbms">DBMS</div>
</div>

<script>
  function openBar(){
    document.getElementById("sidebar").style.width = "320px";
  }

  function closeBar(){
    document.getElementById("sidebar").style.width = "0";
  }
</script>

</body>
</html>
